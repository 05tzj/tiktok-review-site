<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TikTok OAuth Callback</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #142033; background: #f6f8fb; line-height: 1.6; }
    main { max-width: 860px; margin: 0 auto; padding: 64px 20px; }
    .card { background: #fff; border: 1px solid #e1e7ef; border-radius: 8px; padding: 32px; }
    h1 { font-size: 36px; line-height: 1.15; margin: 0 0 12px; }
    p { font-size: 17px; color: #465568; }
    label { display: block; color: #465568; font-weight: 700; margin-top: 22px; }
    code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    pre { white-space: pre-wrap; overflow-wrap: anywhere; background: #f1f5f9; border: 1px solid #dce5ef; border-radius: 8px; padding: 14px; }
    .warn { color: #9f1239; }
  </style>
</head>
<body>
<main>
  <div class="card">
    <h1>TikTok OAuth Callback</h1>
    <p>Copy the authorization code below and use it with the local Python script to exchange for an access token. This page does not send the code anywhere.</p>
    <label>code</label>
    <pre id="code">No code found in URL.</pre>
    <label>state</label>
    <pre id="state">No state found in URL.</pre>
    <p class="warn" id="error"></p>
  </div>
</main>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const state = params.get("state");
  const error = params.get("error") || params.get("error_description");
  document.getElementById("code").textContent = code || "No code found in URL.";
  document.getElementById("state").textContent = state || "No state found in URL.";
  document.getElementById("error").textContent = error ? `TikTok returned an error: ${error}` : "";
</script>
</body>
</html>
